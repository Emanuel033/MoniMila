<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" href="/icons/logo-192.png" />
    <link rel="apple-touch-icon" href="/icons/logo-192.png" />
    
    <meta name="theme-color" content="#312e81" />
    <title>MoniMila Bakery</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function() {
        const path = window.location.pathname;
        let manifestUrl = '/manifest.json'; // Por defecto instala el Catálogo
        
        if (path.includes('rutas')) {
          manifestUrl = '/manifest-rutas.json';
        } else if (path.includes('admin')) {
          manifestUrl = '/manifest-admin.json';
        } else if (path.includes('chofer')) {
          manifestUrl = '/manifest-chofer.json';
        } else if (path.includes('inventario')) {
          manifestUrl = '/manifest-inventario.json';
        }

        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestUrl;
        document.head.appendChild(link);
      })();
      
      // 🚨 EL REGISTRO DEL SERVICE WORKER SE ELIMINÓ DE AQUÍ 🚨
    </script>
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>   <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

  </body>
</html>
