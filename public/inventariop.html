<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditoría Continua - EEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        #reader { border: none !important; border-radius: 1rem; overflow: hidden; }
        #reader video { object-fit: cover; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .mic-active { animation: pulse-red 1.5s infinite; color: #ef4444 !important; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .tab-btn { transition: all 0.2s ease; }
        
        /* Base de la pieza en el lienzo */
        .pieza-lienzo {
            position: absolute;
            background-color: #3b82f6;
            border: 2px solid #60a5fa;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: grab;
            user-select: none;
            touch-action: none; /* Previene scroll al arrastrar */
            transition: border-radius 0.2s ease, width 0.2s ease, height 0.2s ease;
        }
        .pieza-lienzo:active { cursor: grabbing; opacity: 0.9; transform: scale(1.05); }

        /* Formas dinámicas */
        .forma-circulo { width: 34px; height: 34px; border-radius: 50%; }
        .forma-cuadrado { width: 34px; height: 34px; border-radius: 6px; }
        .forma-rectangulo-h { width: 68px; height: 34px; border-radius: 6px; }
        .forma-rectangulo-v { width: 34px; height: 68px; border-radius: 6px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative">

    <script src="assets/js/firebase-config.js"></script>

    <header class="bg-slate-900 border-b border-slate-800 px-4 py-4 flex flex-col md:flex-row md:justify-between items-center z-20 shrink-0 gap-4">
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-900/50 shrink-0">
                <i class="fas fa-clipboard-list text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight leading-none" data-i18n="titulo">Inventario Continuo</h1>
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider mt-1" id="catStatus">Filtrando base...</p>
            </div>
        </div>
        
        <div class="flex gap-3 w-full md:w-auto flex-wrap">
            <button onclick="toggleLang()" class="bg-slate-800 border border-slate-700 hover:bg-slate-700 px-4 py-2 rounded-xl font-bold transition-all flex items-center gap-2">
                <span id="langFlag">🇲🇽</span> <span id="langText">ES</span>
            </button>
            <button onclick="descargarCSVLocal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl font-bold shadow-lg shadow-blue-900/20 transition-all flex items-center gap-2">
                <i class="fas fa-file-excel"></i> <span>CSV</span>
            </button>
            <button onclick="enviarAuditoriaLote()" class="flex-1 md:w-auto bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-emerald-500/20 transition-all">
                <i class="fas fa-cloud-upload-alt mr-2"></i><span data-i18n="btnGuardar">Guardar Nube</span>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto custom-scroll p-4 max-w-5xl mx-auto w-full flex flex-col gap-6 relative">
        <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 flex flex-col gap-4 shrink-0">
            <div class="flex gap-2">
                <button id="btnStartScan" onclick="startScanner()" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 shrink-0">
                    <i class="fas fa-camera text-xl"></i>
                </button>
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="manualCode" list="opcionesProductos" data-i18n-placeholder="buscarPlaceholder" placeholder="Buscar código o nombre..." class="w-full h-full bg-slate-900 border border-slate-700 text-white text-base font-bold rounded-2xl py-4 pl-12 pr-4 focus:border-blue-500 outline-none transition-all" onkeypress="if(event.key === 'Enter') agregarALista(this.value)" onchange="verificarSeleccion(this.value)">
                </div>
            </div>
            
            <div id="readerWrapper" class="hidden w-full bg-slate-900 rounded-2xl overflow-hidden aspect-video relative border border-slate-700">
                <div id="reader" class="absolute inset-0 w-full h-full"></div>
                <button onclick="stopScanner()" class="absolute top-2 right-2 bg-red-500 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg z-10"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div id="emptyState" class="text-center py-12 text-slate-500 flex flex-col items-center">
            <i class="fas fa-boxes text-6xl mb-4 text-slate-700"></i>
            <p class="font-bold text-lg" data-i18n="listaVacia">La lista está vacía.</p>
            <p class="text-sm mt-1" data-i18n="listaVaciaSub">Solo se permiten piezas base del catálogo.</p>
        </div>

        <div id="listaInventario" class="flex flex-col gap-4 pb-20"></div>
        <datalist id="opcionesProductos"></datalist>
    </main>

    <!-- Contenedor para notificaciones flotantes -->
    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl border border-slate-700 z-[200] hidden items-center gap-2 font-bold text-sm">
        <span id="toastMsg"></span>
    </div>

    <!-- MODAL CALCULADORA MULTIMODO -->
    <div id="calcModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-2 md:p-4 overflow-y-auto">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden my-auto">
            
            <div class="p-4 md:p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <h3 class="font-black text-lg text-white" data-i18n="tituloCalc">Calculadora de Estiba</h3>
                <button onclick="cerrarCalculadora()" class="text-slate-400 hover:text-white w-10 h-10 rounded-full bg-slate-700/50 flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-4 md:p-5 space-y-4">
                <!-- Tabs -->
                <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-700 overflow-x-auto custom-scroll">
                    <button id="tabBloque" onclick="setCalcMode('bloque')" class="tab-btn flex-1 min-w-[80px] py-2.5 rounded-lg bg-blue-600 text-white font-black text-[10px] md:text-xs uppercase tracking-wider" data-i18n="modoBloque">Bloque</button>
                    <button id="tabCama" onclick="setCalcMode('cama')" class="tab-btn flex-1 min-w-[80px] py-2.5 rounded-lg text-slate-400 hover:text-slate-200 font-black text-[10px] md:text-xs uppercase tracking-wider" data-i18n="modoCama">Cama Fija</button>
                    <button id="tabVisual" onclick="setCalcMode('visual')" class="tab-btn flex-1 min-w-[80px] py-2.5 rounded-lg text-slate-400 hover:text-slate-200 font-black text-[10px] md:text-xs uppercase tracking-wider" data-i18n="modoVisual">Gráfico Libre</button>
                </div>

                <!-- Zona Dinámica: Modo Bloque -->
                <div id="zonaBloque" class="grid grid-cols-2 gap-3 text-center">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2" data-i18n="calcFrente">Frente</label>
                        <input type="number" id="calcFrente" class="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-xl text-center font-black text-xl focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2" data-i18n="calcFondo">Fondo</label>
                        <input type="number" id="calcFondo" class="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-xl text-center font-black text-xl focus:border-blue-500 outline-none">
                    </div>
                </div>

                <!-- Zona Dinámica: Modo Cama Fija Numérica -->
                <div id="zonaCama" class="hidden grid grid-cols-1 gap-3 text-center">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2" data-i18n="calcPzCama">Pz por Cama (Patrón)</label>
                        <input type="number" id="calcPzCama" class="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-xl text-center font-black text-xl focus:border-blue-500 outline-none text-amber-400">
                    </div>
                </div>

                <!-- Zona Dinámica: Modo Visual (Lienzo Drag & Drop con Formas) -->
                <div id="zonaVisual" class="hidden flex flex-col gap-2">
                    
                    <!-- Selector de Formas Modificado -->
                    <div class="flex gap-1 bg-slate-900 p-1 rounded-xl border border-slate-700 mb-1">
                        <button onclick="setFormaVisual('circulo')" id="btnFormaCirculo" class="flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold text-[10px] uppercase transition" title="Círculo"><i class="fas fa-circle"></i></button>
                        <button onclick="setFormaVisual('cuadrado')" id="btnFormaCuadrado" class="flex-1 py-2 rounded-lg text-slate-400 hover:text-slate-200 font-bold text-[10px] uppercase transition" title="Cuadrado"><i class="fas fa-square"></i></button>
                        <button onclick="setFormaVisual('rectangulo-h')" id="btnFormaRectH" class="flex-1 py-2 rounded-lg text-slate-400 hover:text-slate-200 font-bold text-[10px] uppercase transition" title="Rectángulo Horizontal"><span class="font-black text-sm leading-none">▬</span></button>
                        <button onclick="setFormaVisual('rectangulo-v')" id="btnFormaRectV" class="flex-1 py-2 rounded-lg text-slate-400 hover:text-slate-200 font-bold text-[10px] uppercase transition" title="Rectángulo Vertical"><span class="font-black text-sm leading-none">▮</span></button>
                    </div>

                    <div class="flex gap-2">
                        <button onclick="agregarPiezaLienzo()" class="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-900 font-black py-2.5 rounded-xl text-[11px] uppercase tracking-wider transition shadow-lg shadow-amber-500/20 flex justify-center items-center gap-2">
                            <i class="fas fa-plus-circle"></i> <span data-i18n="btnAddPieza">Añadir Envase</span>
                        </button>
                        <button onclick="limpiarLienzo()" class="w-12 bg-slate-700 hover:bg-red-500 text-white font-bold py-2.5 rounded-xl text-sm transition">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    
                    <div class="bg-slate-900 p-2 rounded-2xl border border-slate-700 relative">
                        <p class="absolute top-2 left-0 right-0 text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center pointer-events-none z-0" data-i18n="instruccionVisual">Arrastra los envases<br>Doble toque para eliminar</p>
                        
                        <!-- EL LIENZO DONDE VIVEN LAS PIEZAS -->
                        <div id="lienzoEstiba" class="w-full h-44 border-2 border-dashed border-slate-600 rounded-xl relative overflow-hidden z-10 bg-slate-900/50 touch-none">
                            <!-- Las piezas se inyectan aquí -->
                        </div>
                    </div>
                </div>

                <!-- ZONA DE PROFUNDIDAD (Tarimas hacia atrás) -->
                <div id="zonaTarimasFondo" class="hidden text-center mt-2 bg-slate-800/80 p-3 rounded-xl border border-slate-700/50">
                    <label class="block text-[10px] font-bold text-purple-400 uppercase mb-2" data-i18n="calcTarimas">Tarimas Hacia Atrás (Fondo)</label>
                    <div class="flex items-center justify-center gap-3">
                        <button onclick="ajustarTarimas(-1)" class="w-10 h-10 rounded-lg bg-slate-700 text-white"><i class="fas fa-minus"></i></button>
                        <input type="number" id="calcTarimas" value="1" class="w-16 bg-slate-900 border border-slate-700 text-white p-2 rounded-xl text-center font-black text-xl focus:border-blue-500 outline-none text-purple-400" oninput="calcularEnVivo()">
                        <button onclick="ajustarTarimas(1)" class="w-10 h-10 rounded-lg bg-slate-700 text-white"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <!-- Zona Constante de Niveles y Ajuste -->
                <div class="grid grid-cols-2 gap-3 text-center border-t border-slate-700 pt-4 mt-2">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2" data-i18n="calcNiveles">Niveles (Capas)</label>
                        <input type="number" id="calcNiveles" class="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-xl text-center font-black text-xl focus:border-blue-500 outline-none text-blue-400">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2" data-i18n="calcAjuste">Ajuste (+/-)</label>
                        <input type="number" id="calcAjuste" value="0" class="w-full bg-slate-900 border border-slate-700 text-white p-3 rounded-xl text-center font-black text-xl focus:border-blue-500 outline-none text-emerald-400">
                    </div>
                </div>

                <!-- TOTAL -->
                <div class="bg-blue-600/20 border border-blue-500/30 p-3 rounded-2xl text-center mt-2 flex justify-between items-center px-6 shadow-inner">
                    <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Total Estimado</p>
                    <p class="text-4xl font-black text-white" id="calcResultado">0</p>
                </div>
            </div>

            <div class="p-4 bg-slate-900/50 flex gap-3">
                <button onclick="cerrarCalculadora()" class="flex-1 py-3 md:py-4 bg-slate-700 hover:bg-slate-600 text-slate-300 font-bold rounded-2xl text-sm transition" data-i18n="btnCerrar">Cancelar</button>
                <button onclick="aplicarCalculo()" class="flex-[2] py-3 md:py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl shadow-lg shadow-blue-600/20 text-sm transition" data-i18n="btnAplicar">Sumar</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // SISTEMA BILINGÜE Y DICCIONARIOS
        // ==========================================
        const diccionarios = {
            es: {
                titulo: "Inventario Continuo",
                buscarPlaceholder: "Buscar código o nombre...",
                listaVacia: "La lista está vacía.",
                listaVaciaSub: "Solo se permiten piezas base del catálogo.",
                btnGuardar: "Guardar Nube",
                stockSistema: "STOCK SISTEMA",
                totalFisico: "TOTAL FÍSICO",
                ajuste: "AJUSTE",
                entrada: "ENTRADA",
                salida: "SALIDA",
                ok: "CORRECTO",
                sueltas: "Sueltas (1pz)",
                paquete: "Paquete",
                caja: "Caja",
                btnNuevoEmpaque: "Añadir empaque no registrado",
                promptPiezas: "¿Cuántas piezas tiene este nuevo paquete?",
                codigoNuevo: "Código no registrado en base de datos.",
                desconocido: "No registrado",
                pz_abrev: "pz",
                txtNuevoPaquete: "Nuevo Paquete ({pz}pz) ✨",
                escuchando: "Escuchando...",
                noEntendido: "No entendí",
                microNoSoportado: "No soportado",
                tituloCalc: "Calculadora de Estiba",
                modoBloque: "Bloque",
                modoCama: "Cama Numérica",
                modoVisual: "Lienzo Libre",
                calcFrente: "Frente",
                calcFondo: "Fondo",
                calcPzCama: "Pz por Cama",
                calcTarimas: "Tarimas Hacia Atrás (Fondo)",
                calcNiveles: "Niveles (Capas)",
                calcAjuste: "Ajuste (+/-)",
                btnAddPieza: "Añadir Envase",
                instruccionVisual: "Arrastra los envases<br>Doble toque para eliminar",
                btnAplicar: "Sumar al Conteo",
                btnCerrar: "Cancelar"
            },
            fr: {
                titulo: "Inventaire Continu",
                buscarPlaceholder: "Rechercher...",
                listaVacia: "La liste est vide.",
                listaVaciaSub: "Seules las pièces base sont permises.",
                btnGuardar: "Enregistrer",
                stockSistema: "STOCK SYSTÈME",
                totalFisico: "TOTAL PHYSIQUE",
                ajuste: "AJUSTEMENT",
                entrada: "ENTRÉE",
                salida: "SORTIE",
                ok: "CORRECT",
                sueltas: "Unité (1pc)",
                paquete: "Paquet",
                caja: "Boîte",
                btnNuevoEmpaque: "Ajouter paquet",
                promptPiezas: "Nombre de pièces ?",
                codigoNuevo: "Code inconnu.",
                desconocido: "Inconnu",
                pz_abrev: "pc",
                txtNuevoPaquete: "Paquet ({pz}pc) ✨",
                escuchando: "J'écoute...",
                noEntendido: "Pas compris",
                microNoSoportado: "Pas supporté",
                tituloCalc: "Calculateur de Bloc",
                modoBloque: "Bloc",
                modoCama: "Lit Fixe",
                modoVisual: "Toile Libre",
                calcFrente: "Face",
                calcFondo: "Fond",
                calcPzCama: "Pz par lit",
                calcTarimas: "Palettes (Fond)",
                calcNiveles: "Niveaux",
                calcAjuste: "Ajuste (+/-)",
                btnAddPieza: "Ajouter Pièce",
                instruccionVisual: "Faites glisser les conteneurs<br>Double tap pour supprimer",
                btnAplicar: "Ajouter",
                btnCerrar: "Annuler"
            }
        };

        let currentLang = 'es';
        let calcTarget = { codigo: null, varId: null };
        let currentCalcMode = 'bloque';
        let idPiezaLienzo = 0;
        let formaVisualActual = 'circulo'; // circulo, cuadrado, rectangulo-h, rectangulo-v
        let catalogoEnMemoria = [];
        let listaConteo = [];
        let html5QrcodeScanner = null;

        async function loadJSONCatalog() {
            try {
                const response = await fetch('catalogo_completo.json');
                if (!response.ok) throw new Error("JSON no encontrado");
                
                const rawData = await response.json();
                catalogoEnMemoria = rawData.filter(p => p.tipo_item === 'PIEZA_BASE');
                
                const datalist = document.getElementById('opcionesProductos');
                datalist.innerHTML = ''; 
                catalogoEnMemoria.forEach(p => {
                    const option = document.createElement('option');
                    option.value = p.codigo; 
                    option.textContent = p.descripcion_oficial || p.nombre; 
                    datalist.appendChild(option);
                });
                document.getElementById('catStatus').innerHTML = `<i class="fas fa-check-circle text-emerald-400"></i> ${catalogoEnMemoria.length} piezas base`;
            } catch (error) {
                document.getElementById('catStatus').innerHTML = `<i class="fas fa-exclamation-triangle text-red-400"></i> Error Catálogo`;
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'es' ? 'fr' : 'es';
            document.getElementById('langFlag').innerText = currentLang === 'es' ? '🇲🇽' : '🇫🇷';
            document.getElementById('langText').innerText = currentLang === 'es' ? 'ES' : 'FR';
            aplicarTextos();
            renderLista(); 
        }

        function aplicarTextos() {
            const t = diccionarios[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[key]) el.innerText = t[key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if(t[key]) el.placeholder = t[key];
            });
        }

        function startScanner() {
            const wrapper = document.getElementById('readerWrapper');
            wrapper.classList.remove('hidden');
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                (decodedText) => {
                    stopScanner();
                    agregarALista(decodedText);
                }, 
                (err) => {}
            ).catch(() => stopScanner());
        }

        function stopScanner() {
            if(html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('readerWrapper').classList.add('hidden');
                });
            }
        }

        function verificarSeleccion(valor) {
            if(valor.trim() !== '') agregarALista(valor);
        }

        function agregarALista(codigoBuscado) {
            codigoBuscado = String(codigoBuscado).trim();
            if(!codigoBuscado) return;
            document.getElementById('manualCode').value = '';

            let prodBase = catalogoEnMemoria.find(p => String(p.codigo).toLowerCase() === codigoBuscado.toLowerCase());
            
            if (!prodBase) {
                for (const p of catalogoEnMemoria) {
                    const empaques = p.paquetes || p.empaques || [];
                    if (empaques.some(e => String(e.sku).toLowerCase() === codigoBuscado.toLowerCase() || String(e.codigo_barras).toLowerCase() === codigoBuscado.toLowerCase())) {
                        prodBase = p; break;
                    }
                }
            }

            if (!prodBase) return showToast(diccionarios[currentLang].codigoNuevo, "info");

            if (listaConteo.find(item => String(item.codigo) === String(prodBase.codigo))) {
                const row = document.getElementById(`row_${prodBase.codigo}`);
                if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            let variantes = [{ id: 'sueltas', sku: null, pz: 1, contadas: 0, isFantasma: false }];
            const empaques = prodBase.paquetes || prodBase.empaques || [];
            
            empaques.forEach((emp, index) => {
                variantes.push({ 
                    id: `emp_${index}`, 
                    sku: emp.sku || null,
                    pz: parseInt(emp.piezas), 
                    contadas: 0, 
                    isFantasma: false
                });
            });

            variantes.sort((a,b) => b.pz - a.pz);

            listaConteo.unshift({
                codigo: String(prodBase.codigo),
                nombre: prodBase.descripcion_oficial || prodBase.nombre,
                stockSistema: parseFloat(prodBase.stock || 0),
                variantes: variantes,
                totalFisico: 0
            });

            renderLista();
        }

        window.agregarEmpaqueNuevo = (codigoStr) => {
            const prod = listaConteo.find(p => String(p.codigo) === String(codigoStr));
            if(!prod) return;
            
            let pzInput = prompt(diccionarios[currentLang].promptPiezas, "12");
            if(!pzInput) return;
            const pz = parseInt(pzInput, 10);
            if(isNaN(pz) || pz <= 1) return showToast("Mínimo 2 piezas", "error");

            prod.variantes.push({
                id: 'fantasma_' + Date.now(),
                sku: null,
                pz: pz,
                contadas: 0,
                isFantasma: true
            });
            
            prod.variantes.sort((a,b) => b.pz - a.pz);
            renderLista();
        };

        // ==========================================
        // CALCULADORA Y LIENZO DRAG & DROP
        // ==========================================
        window.abrirCalculadora = (codigo, varId) => {
            calcTarget = { codigo, varId };
            
            // Reset inputs
            ['calcFrente', 'calcFondo', 'calcPzCama', 'calcNiveles'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = "";
            });
            document.getElementById('calcTarimas').value = "1";
            document.getElementById('calcAjuste').value = "0";
            document.getElementById('calcResultado').innerText = "0";
            
            // Reset lienzo visual
            limpiarLienzo();
            setFormaVisual('circulo'); // Default a circulo
            
            setCalcMode('bloque');
            document.getElementById('calcModal').classList.remove('hidden');
        };

        window.cerrarCalculadora = () => document.getElementById('calcModal').classList.add('hidden');

        window.setCalcMode = (mode) => {
            currentCalcMode = mode;
            const tBloque = document.getElementById('tabBloque');
            const tCama = document.getElementById('tabCama');
            const tVisual = document.getElementById('tabVisual');
            const zBloque = document.getElementById('zonaBloque');
            const zCama = document.getElementById('zonaCama');
            const zVisual = document.getElementById('zonaVisual');
            const zTarimas = document.getElementById('zonaTarimasFondo');

            [tBloque, tCama, tVisual].forEach(t => t.className = "tab-btn flex-1 min-w-[80px] py-2.5 rounded-lg text-slate-400 hover:text-slate-200 font-black text-[10px] md:text-xs uppercase tracking-wider bg-transparent");
            
            [zBloque, zCama, zVisual, zTarimas].forEach(z => { 
                z.classList.add('hidden'); 
                z.classList.remove('grid', 'flex'); 
            });

            if (mode === 'bloque') {
                tBloque.classList.add('bg-blue-600', 'text-white');
                tBloque.classList.remove('text-slate-400');
                zBloque.classList.remove('hidden'); zBloque.classList.add('grid');
            } else if (mode === 'cama') {
                tCama.classList.add('bg-blue-600', 'text-white');
                tCama.classList.remove('text-slate-400');
                zCama.classList.remove('hidden'); zCama.classList.add('grid');
                zTarimas.classList.remove('hidden');
            } else if (mode === 'visual') {
                tVisual.classList.add('bg-blue-600', 'text-white');
                tVisual.classList.remove('text-slate-400');
                zVisual.classList.remove('hidden'); zVisual.classList.add('flex');
                zTarimas.classList.remove('hidden');
            }
            calcularEnVivo();
        };

        window.setFormaVisual = (forma) => {
            formaVisualActual = forma;
            const btnC = document.getElementById('btnFormaCirculo');
            const btnQ = document.getElementById('btnFormaCuadrado');
            const btnRH = document.getElementById('btnFormaRectH');
            const btnRV = document.getElementById('btnFormaRectV');

            [btnC, btnQ, btnRH, btnRV].forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('text-slate-400');
            });

            if(forma === 'circulo') { btnC.classList.add('bg-blue-600', 'text-white'); btnC.classList.remove('text-slate-400'); }
            else if(forma === 'cuadrado') { btnQ.classList.add('bg-blue-600', 'text-white'); btnQ.classList.remove('text-slate-400'); }
            else if(forma === 'rectangulo-h') { btnRH.classList.add('bg-blue-600', 'text-white'); btnRH.classList.remove('text-slate-400'); }
            else if(forma === 'rectangulo-v') { btnRV.classList.add('bg-blue-600', 'text-white'); btnRV.classList.remove('text-slate-400'); }
        };

        window.ajustarTarimas = (delta) => {
            const input = document.getElementById('calcTarimas');
            let val = parseInt(input.value) || 1;
            val += delta;
            if (val < 1) val = 1;
            input.value = val;
            calcularEnVivo();
        };

        window.agregarPiezaLienzo = () => {
            idPiezaLienzo++;
            const lienzo = document.getElementById('lienzoEstiba');
            const pieza = document.createElement('div');
            
            pieza.className = `pieza-lienzo forma-${formaVisualActual}`;
            pieza.innerText = idPiezaLienzo;
            
            const offset = Math.floor(Math.random() * 20) - 10;
            pieza.style.left = `calc(50% - 16px + ${offset}px)`;
            pieza.style.top = `calc(50% - 16px + ${offset}px)`;

            hacerArrastrable(pieza);
            lienzo.appendChild(pieza);
            calcularEnVivo();
        };

        window.limpiarLienzo = () => {
            document.getElementById('lienzoEstiba').innerHTML = '';
            idPiezaLienzo = 0;
            calcularEnVivo();
        };

        function hacerArrastrable(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            elmnt.onmousedown = (e) => {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = cerrarArrastre;
                document.onmousemove = arrastrarMouse;
            };

            elmnt.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                document.addEventListener('touchend', cerrarArrastre, {passive: false});
                document.addEventListener('touchmove', arrastrarTouch, {passive: false});
            }, {passive: false});

            function arrastrarMouse(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                aplicarPosicion();
            }

            function arrastrarTouch(e) {
                e.preventDefault();
                pos1 = pos3 - e.touches[0].clientX;
                pos2 = pos4 - e.touches[0].clientY;
                pos3 = e.touches[0].clientX;
                pos4 = e.touches[0].clientY;
                aplicarPosicion();
            }

            function aplicarPosicion() {
                const lienzo = document.getElementById('lienzoEstiba');
                let newTop = elmnt.offsetTop - pos2;
                let newLeft = elmnt.offsetLeft - pos1;
                
                if (newTop < 0) newTop = 0;
                if (newLeft < 0) newLeft = 0;
                if (newTop > lienzo.clientHeight - elmnt.clientHeight) newTop = lienzo.clientHeight - elmnt.clientHeight;
                if (newLeft > lienzo.clientWidth - elmnt.clientWidth) newLeft = lienzo.clientWidth - elmnt.clientWidth;

                elmnt.style.top = newTop + "px";
                elmnt.style.left = newLeft + "px";
            }

            function cerrarArrastre() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.removeEventListener('touchend', cerrarArrastre);
                document.removeEventListener('touchmove', arrastrarTouch);
            }

            let ultimoTap = 0;
            elmnt.addEventListener('touchend', function(e) {
                let tiempoActual = new Date().getTime();
                let tiempoTap = tiempoActual - ultimoTap;
                if (tiempoTap < 300 && tiempoTap > 0) {
                    elmnt.remove();
                    calcularEnVivo();
                }
                ultimoTap = tiempoActual;
            });
            elmnt.ondblclick = () => { elmnt.remove(); calcularEnVivo(); };
        }

        function calcularEnVivo() {
            const n = parseInt(document.getElementById('calcNiveles').value) || 0;
            const a = parseInt(document.getElementById('calcAjuste').value) || 0;
            let subtotal = 0;

            if (currentCalcMode === 'bloque') {
                const f = parseInt(document.getElementById('calcFrente').value) || 0;
                const d = parseInt(document.getElementById('calcFondo').value) || 0;
                subtotal = (f * d * n);
            } else if (currentCalcMode === 'cama') {
                const pz = parseInt(document.getElementById('calcPzCama').value) || 0;
                const tarimas = parseInt(document.getElementById('calcTarimas').value) || 1; 
                subtotal = (pz * n * tarimas);
            } else if (currentCalcMode === 'visual') {
                const pzEnLienzo = document.querySelectorAll('.pieza-lienzo').length;
                const tarimas = parseInt(document.getElementById('calcTarimas').value) || 1;
                subtotal = (pzEnLienzo * n * tarimas);
            }

            document.getElementById('calcResultado').innerText = Math.max(0, subtotal + a);
        }

        ['calcFrente', 'calcFondo', 'calcPzCama', 'calcTarimas', 'calcNiveles', 'calcAjuste'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.addEventListener('input', calcularEnVivo);
        });

        window.aplicarCalculo = () => {
            const total = parseInt(document.getElementById('calcResultado').innerText) || 0;
            const prod = listaConteo.find(p => String(p.codigo) === String(calcTarget.codigo));
            if(prod && total > 0) {
                const v = prod.variantes.find(v => String(v.id) === String(calcTarget.varId));
                if(v) {
                    v.contadas += total;
                    recalcularTotalProducto(prod);
                    renderLista();
                }
            }
            cerrarCalculadora();
        };

        // ==========================================
        // DICTADO DE VOZ Y RENDERIZADO
        // ==========================================
        
        // MODIFICACIÓN 3: La función de dictado ahora recibe y muestra la letra (Index Alfabético)
        window.iniciarDictado = (codigoProd, varId, btnElement, letterIndex) => {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return showToast("No soportado", "error");
            const recognition = new SpeechRecognition();
            recognition.lang = currentLang === 'es' ? 'es-MX' : 'fr-FR';
            btnElement.querySelector('i').classList.add('mic-active');
            
            // Damos el feedback visual de qué letra estamos afectando
            showToast(`🎤 Escuchando cantidad para el índice [ ${letterIndex} ]...`, 'info');

            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                const n = transcript.match(/\d+/);
                if (n) manualCant(codigoProd, varId, parseInt(n[0], 10));
                renderLista();
            };
            recognition.onend = () => btnElement.querySelector('i').classList.remove('mic-active');
            recognition.start();
        };

        function renderLista() {
            const container = document.getElementById('listaInventario');
            const empty = document.getElementById('emptyState');
            const t = diccionarios[currentLang];

            if (listaConteo.length === 0) {
                empty.classList.remove('hidden');
                container.innerHTML = '';
                return;
            }
            
            empty.classList.add('hidden');
            let htmlChunks = [];

            listaConteo.forEach((item) => {
                const diferencia = item.totalFisico - item.stockSistema;
                let badgeHtml = '', borderColor = 'border-slate-700';
                const safeCod = String(item.codigo).replace(/'/g, "\\'").replace(/"/g, '&quot;');

                if (diferencia > 0) {
                    badgeHtml = `<span class="bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded text-[10px] font-black tracking-wider"><i class="fas fa-arrow-up"></i> ${t.entrada} (+${diferencia})</span>`;
                    borderColor = 'border-emerald-500/50';
                } else if (diferencia < 0) {
                    badgeHtml = `<span class="bg-red-500/20 text-red-400 px-2 py-1 rounded text-[10px] font-black tracking-wider"><i class="fas fa-arrow-down"></i> ${t.salida} (${diferencia})</span>`;
                    borderColor = 'border-red-500/50';
                } else {
                    badgeHtml = `<span class="bg-slate-700 text-slate-300 px-2 py-1 rounded text-[10px] font-black tracking-wider"><i class="fas fa-check"></i> ${t.ok}</span>`;
                }

                // MODIFICACIÓN 1 y 2: Generamos la letra (A, B, C...) y la inyectamos visualmente
                let variantesHtml = item.variantes.map((v, index) => {
                    const letterIndex = String.fromCharCode(65 + index); // 65 es 'A' en ASCII
                    const safeVarId = String(v.id).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    let label = v.id === 'sueltas' ? t.sueltas : (v.isFantasma ? t.txtNuevoPaquete.replace('{pz}', v.pz) : (v.sku ? `${v.sku} (${v.pz}${t.pz_abrev})` : `${v.pz >= 500 ? t.caja : t.paquete} (${v.pz}${t.pz_abrev})`));
                    
                    return `
                    <div class="flex items-center justify-between py-2 border-b border-slate-700/50 last:border-0">
                        <div class="flex items-center gap-2 flex-1 pr-2 truncate">
                            <span class="bg-slate-700 text-blue-400 font-black text-[10px] px-2 py-0.5 rounded border border-slate-600 shadow-sm">[ ${letterIndex} ]</span>
                            <span class="text-xs font-bold ${v.isFantasma ? 'text-amber-400' : 'text-slate-400'} truncate">${label}</span>
                        </div>
                        <div class="flex items-center gap-1 shrink-0">
                            <button onclick="abrirCalculadora('${safeCod}', '${safeVarId}')" class="w-9 h-9 rounded-lg bg-slate-800 text-blue-400 border border-slate-700"><i class="fas fa-calculator text-sm"></i></button>
                            <button onclick="iniciarDictado('${safeCod}', '${safeVarId}', this, '${letterIndex}')" class="w-9 h-9 rounded-lg bg-slate-800 text-slate-400 border border-slate-700"><i class="fas fa-microphone text-sm"></i></button>
                            <div class="flex items-center gap-1 bg-slate-900 rounded-xl p-1 border border-slate-700">
                                <button onclick="cambiarCant('${safeCod}', '${safeVarId}', -1)" class="w-8 h-8 rounded-lg bg-slate-800 text-slate-300"><i class="fas fa-minus text-xs"></i></button>
                                <input type="number" min="0" value="${v.contadas}" oninput="manualCant('${safeCod}', '${safeVarId}', this.value)" onfocus="this.select()" class="w-10 text-center font-black text-white bg-transparent outline-none">
                                <button onclick="cambiarCant('${safeCod}', '${safeVarId}', 1)" class="w-8 h-8 rounded-lg bg-blue-600 text-white"><i class="fas fa-plus text-xs"></i></button>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                htmlChunks.push(`
                <div id="row_${item.codigo}" class="bg-slate-800 p-4 rounded-3xl border ${borderColor} transition-colors shadow-lg">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1 pr-4">
                            <h3 class="font-black text-lg text-white leading-tight">${item.nombre}</h3>
                            <p class="font-mono text-xs text-blue-400 mt-1">${item.codigo}</p>
                        </div>
                        <button onclick="eliminarDeLista('${safeCod}')" class="text-slate-500 hover:text-red-400 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="bg-slate-900/50 rounded-2xl p-3 mb-2">${variantesHtml}</div>
                    <button onclick="agregarEmpaqueNuevo('${safeCod}')" class="w-full text-center text-[10px] text-blue-400 font-bold py-2.5 mb-4 hover:bg-slate-700 rounded-xl border border-dashed border-slate-600 uppercase">
                        <i class="fas fa-plus mr-1"></i> <span data-i18n="btnNuevoEmpaque">${t.btnNuevoEmpaque}</span>
                    </button>
                    <div class="grid grid-cols-2 gap-3 mb-2">
                        <div class="bg-slate-900 rounded-2xl p-3 border border-slate-700 text-center">
                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="stockSistema">${t.stockSistema}</p>
                            <p class="text-2xl font-black text-slate-300">${item.stockSistema}</p>
                        </div>
                        <div class="bg-blue-900/30 rounded-2xl p-3 border border-blue-900/50 text-center">
                            <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest" data-i18n="totalFisico">${t.totalFisico}</p>
                            <p class="text-3xl font-black text-white" id="totFisico_${item.codigo}">${item.totalFisico}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center px-2 mt-3">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest" data-i18n="ajuste">${t.ajuste}:</span>
                        ${badgeHtml}
                    </div>
                </div>`);
            });
            container.innerHTML = htmlChunks.join('');
        }

        window.cambiarCant = (codigoProd, varId, delta) => {
            const prod = listaConteo.find(p => String(p.codigo) === String(codigoProd));
            if(!prod) return;
            const v = prod.variantes.find(v => String(v.id) === String(varId));
            if(!v) return;
            v.contadas = Math.max(0, v.contadas + delta);
            recalcularTotalProducto(prod);
        };

        window.manualCant = (codigoProd, varId, val) => {
            const prod = listaConteo.find(p => String(p.codigo) === String(codigoProd));
            if(!prod) return;
            const v = prod.variantes.find(v => String(v.id) === String(varId));
            if(!v) return;
            v.contadas = Math.max(0, parseInt(val, 10) || 0);
            recalcularTotalProducto(prod);
        };

        function recalcularTotalProducto(prod) {
            prod.totalFisico = prod.variantes.reduce((sum, v) => sum + (v.pz * v.contadas), 0);
            const txtTotal = document.getElementById(`totFisico_${prod.codigo}`);
            if(txtTotal) txtTotal.innerText = prod.totalFisico;
            renderLista();
        }

        window.eliminarDeLista = (codigoStr) => {
            listaConteo = listaConteo.filter(p => String(p.codigo) !== String(codigoStr));
            renderLista();
        };

        window.descargarCSVLocal = () => {
            if(listaConteo.length === 0) return;
            let csv = "\uFEFFCodigo,Producto,Stock Sistema,Total Fisico,Ajuste,Detalle Conteos\n";
            listaConteo.forEach(item => {
                const dif = item.totalFisico - item.stockSistema;
                let det = item.variantes.filter(v => v.contadas > 0).map(v => `${v.pz}pz: ${v.contadas}`).join(" | ");
                csv += `"${item.codigo}","${item.nombre.replace(/"/g, '""')}",${item.stockSistema},${item.totalFisico},${dif},"${det}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Inventario_EEN_${new Date().getTime()}.csv`;
            link.click();
        };

        async function enviarAuditoriaLote() {
            if(listaConteo.length === 0) return;
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            try {
                const batch = db.batch();
                listaConteo.forEach(item => {
                    const docRef = db.collection('auditorias_pendientes').doc();
                    batch.set(docRef, {
                        codigo_contpaqi: item.codigo,
                        nombre_producto: item.nombre,
                        esperado: item.stockSistema,
                        conteo_fisico: item.totalFisico,
                        ajuste_calculado: item.totalFisico - item.stockSistema,
                        fecha: firebase.firestore.FieldValue.serverTimestamp(),
                        usuario: 'Tablet Almacén',
                        desglose: item.variantes.map(v => ({ pz: v.pz, cont: v.contadas }))
                    });
                });
                await batch.commit();
                showToast("¡Enviado!");
                listaConteo = [];
                renderLista();
            } catch(error) {
                showToast("Error de red", "error");
            } finally {
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt mr-2"></i><span>Guardar Nube</span>';
            }
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.remove('hidden'); t.classList.add('flex');
            setTimeout(() => { t.classList.add('hidden'); t.classList.remove('flex'); }, 3000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            aplicarTextos();
            loadJSONCatalog();
        });
    </script>
</body>
</html>
